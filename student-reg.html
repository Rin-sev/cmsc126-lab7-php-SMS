<!DOCTYPE html>
<html>
    <head>
        <title>Student Registry</title>
        <link rel="stylesheet" href="lab7.css">
    </head>

    <body>
        <header>
            <h1>Student Registration</h1>
            <h2>All fields marked with <span style="color: #b22222;">*</span> are required</h2>
        </header>
        
        <!-- STUDENT INFORMATION -->
       <div class="container">
            <form id="studentRegistry">
            
                <!-- PERSONAL INFORMATION -->
                <div class="personal-info">
                    <h3>PERSONAL INFORMATION</h3>
                        <label for="sName" class="required-label">Name </label>
                        <input type="text" id="sname" name="sname" placeholder="Juan Dela Cruz"><br>

                        <label for="sAge" class="required-label">Age </label>
                        <input type="text" id="sage" name="sage" placeholder="0-99"><br>

                        <label for="sEmail"class="required-label">Email </label>
                        <input type="text" id="semail" name="semail" placeholder="e.g. jdcruz@up.edu.ph">
                        <p>Must be a valid email address (max 40 chars).</p> 
                </div>

                <!-- ACADEMIC INFORMATION -->
                <div class="acad-info">
                    <h3>ACADEMIC INFORMATION</h3>
                    <div class="row">
                        <div class="course">
                            <label for="sCourse" class="required-label">Course </label>
                            <input type="text" id="scourse" name="scourse" placeholder="e.g. BS Computer Science"> 
                        </div> 
                        
                        <div class="level">
                            <label for="sLevel" class="required-label">Year Level </label>
                            <select name="yearLevel" id="yearLevel">
                                <option value="first">First Year</option>
                                <option value="second">Second Year</option>
                                <option value="third">Third Year</option>
                                <option value="fourth">Fourth Year</option>
                                <option value="nth">Nth Year</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- PROFILE PICTURE -->
                <div class="profile-pic full-width">
                    <h3>PROFILE PHOTO</h3>
                    <label class="required-label">Profile Image </label><br>

                    <div class="drop-zone">
                        <label for="file-upload" class="drop-zone-content">
                            <img class="img-icn" src="img_icon.png" alt="icon"> <p><strong>Choose a file</strong> or drag it here</p>
                            <span>JPG, PNG, GIF, WEBP accepted</span>
                        </label>
                        <input type="file" id="file-upload" accept="image/*" hidden>
                    </div>
                </div>

                <!-- RECORDS -->
                <div class="records full-width">
                    <h3>RECORD MANAGEMENT</h3>
                    <p>LOOK UP BY STUDENT ID</p>
                    <input type="text" id="search" name="search" placeholder="Enter Student ID (e.g. 2024-00123)">
                    <div class="buttons">
                        <button id="searchBtn">Search</button>
                        <button id="updBtn">Update</button>
                        <button id="delBtn">Delete</button>
                    </div>
                </div>
            </form>
       </div>
    </body>
</html>
